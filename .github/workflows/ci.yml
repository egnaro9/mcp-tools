name: ci
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - run: pytest -q
      - name: The server answers a real MCP handshake over stdio
        run: |
          printf '%s\n' \
            '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2025-06-18","capabilities":{}}}' \
            '{"jsonrpc":"2.0","id":2,"method":"tools/list"}' \
            | python -m mcptools | python -c "import sys,json; rs=[json.loads(l) for l in sys.stdin]; assert rs[0]['result']['protocolVersion']=='2025-06-18'; assert {t['name'] for t in rs[1]['result']['tools']}=={'calc','search'}; print('MCP handshake OK')"
